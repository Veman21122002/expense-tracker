{% extends "base.html" %}
{% block content %}
<div class="container">
    <div class="header-section">
        <h1>People</h1>
        <a href="{{ url_for('add_expense') }}" class="btn btn-primary">Add New Entry</a>
    </div>

    <div class="people-grid">
        {% for person in people %}
        <a href="{{ url_for('person_details', name=person) }}" class="person-card">
            <div class="person-info">
                <h3>{{ person }}</h3>
                <p>View balance and history</p>
            </div>
            <div class="arrow">&rarr;</div>
        </a>
        {% else %}
        <p class="no-data">No people found. Add some expenses first!</p>
        {% endfor %}
    </div>
</div>

<style>
.people-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 20px;
}
.person-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    text-decoration: none;
    color: inherit;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid #eee;
}
.person-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 12px rgba(0,0,0,0.1);
}
.person-info h3 {
    margin: 0 0 5px 0;
    color: var(--primary-color, #333);
}
.person-info p {
    margin: 0;
    font-size: 0.9rem;
    color: #666;
}
.arrow {
    font-size: 1.5rem;
    color: #ccc;
}
.no-data {
    text-align: center;
    grid-column: 1 / -1;
    padding: 40px;
    color: #666;
}
.header-section {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}
</style>
{% endblock %}
