{% extends "base.html" %}
{% block title %}Login - Expense Tracker{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Enter your details to manage your expenses</p>
        </div>
        <div class="auth-card">
            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label for="identifier">Username or Email</label>
                    <input type="text" id="identifier" name="identifier" class="form-input" placeholder="jane@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Login</button>
            </form>
        </div>
        <div class="auth-switch">
            Don't have an account? <a href="{{ url_for('register') }}">Register now</a>
        </div>
    </div>
</section>
{% endblock %}
