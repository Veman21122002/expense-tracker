{% extends "base.html" %}
{% block title %}Register - Expense Tracker{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Start tracking your financial transactions today</p>
        </div>
        <div class="auth-card">
            <form action="{{ url_for('register') }}" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="janedoe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="jane@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Create Account</button>
            </form>
        </div>
        <div class="auth-switch">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </div>
    </div>
</section>
{% endblock %}
